<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Idle Frontier</title><link rel="stylesheet" href="./static/css/app.css"><script src="./static/js/htmx.min.js"></script><script src="./static/js/wasm_exec.js"></script><script src="./static/js/wasm-loader.js"></script><script type="module" src="./static/js/app.js"></script></head><body class="min-h-screen bg-zinc-950 text-zinc-100"><div class="min-h-screen bg-gamebg text-zinc-100"><header class="sticky top-0 z-40 border-b border-zinc-800/70 bg-zinc-950/90 backdrop-blur"><div class="mx-auto flex max-w-md items-center justify-between px-4 py-5 md:max-w-6xl md:px-6"><div><h1 class="text-3xl font-extrabold tracking-tight">Idle Frontier</h1><div class="mt-1 text-xs uppercase tracking-[0.35em] text-zinc-500">Idle</div></div><div class="flex items-center gap-3"><div class="stat-ribbon rounded-2xl bg-zinc-900/80 px-4 py-2 shadow-[0_0_0_1px_rgba(255,255,255,0.04)]"><span class="icon-[mdi--gold] icon-md text-amber-400"></span> <span class="text-lg font-semibold">0</span></div><button type="button" class="flex h-11 w-11 items-center justify-center rounded-full border border-zinc-800 bg-zinc-900 text-zinc-300" data-tab-open="settings"><span class="icon-[mdi--cog] icon-lg"></span></button></div></div></header><main class="mx-auto flex min-h-[calc(100vh-9rem)] w-full max-w-md flex-col px-4 pb-28 pt-4 md:max-w-6xl md:px-6 md:pb-8"><div class="grid gap-4 md:grid-cols-[320px_minmax(0,1fr)]"><div class="space-y-4"><section id="stats-panel" class="card hidden md:block"><div class="mb-4 flex items-center justify-between"><h2>Stats</h2><div class="resource-pill"><span class="icon-[mdi--gold] icon-sm text-amber-400"></span> <span>0</span></div></div><div class="space-y-3"><div class="stat-ribbon"><span class="icon-[mdi--sword] icon-sm text-cyan-400"></span> <span class="text-zinc-400">Attack</span> <span class="ml-auto font-semibold">2</span></div><div class="stat-ribbon"><span class="icon-[mdi--shield] icon-sm text-cyan-400"></span> <span class="text-zinc-400">Defense</span> <span class="ml-auto font-semibold">1</span></div><div class="stat-ribbon"><span class="icon-[mdi--heart] icon-sm text-rose-400"></span> <span class="text-zinc-400">HP</span> <span class="ml-auto font-semibold">20</span></div><div class="stat-ribbon"><span class="icon-[mdi--sword-cross] icon-sm text-cyan-400"></span> <span class="text-zinc-400">Combat Lv</span> <span class="ml-auto font-semibold">1</span></div><div class="stat-ribbon"><span class="icon-[mdi--axe] icon-sm text-cyan-400"></span> <span class="text-zinc-400">Woodcutting Lv</span> <span class="ml-auto font-semibold">1</span></div></div></section><section id="activity-panel" class="card hidden md:block"><div class="mb-4 flex items-center justify-between"><h2>Activity</h2></div><div class="space-y-3"><div class="rounded-xl border border-zinc-800 bg-zinc-900/60 p-3"><div class="mb-2 flex justify-between text-sm"><span class="text-zinc-400">Enemy HP</span> <span>12 / 12</span></div><div class="progress-bar-container"><div class="progress-bar-fill" style="width: 100.00%;"></div></div></div><div class="rounded-xl border border-zinc-800 bg-zinc-900/60 p-3"><div class="mb-2 flex justify-between text-sm"><span class="text-zinc-400">Progress</span> <span>0</span></div><div class="progress-bar-container"><div class="progress-bar-fill" style="width: 0%;"></div></div></div><div class="flex gap-2"><button class="btn-primary flex-1" data-action="start_current_combat">Start</button> <button class="btn flex-1" data-action="stop_activity">Stop</button></div></div></section></div><div class="space-y-4"><section id="selections-panel" class="space-y-4"><div class="card"><div class="mb-3 flex items-center justify-between"><h2>Zones</h2><span class="text-xs uppercase tracking-[0.25em] text-zinc-500">Travel</span></div><div class="space-y-2"><button class="w-full rounded-2xl border border-cyan-500/40 bg-cyan-500/10 px-4 py-3 text-left shadow-glow" data-action="open_zone" data-id="verdant_meadows"><div class="flex items-center justify-between"><div><div class="font-semibold">Verdant Meadows</div><div class="mt-1 text-xs text-zinc-400">Required Lv 1</div></div><span class="icon-[mdi--map-marker] icon-md { zoneIconClass(active) }"></span></div></button></div></div><div class="card"><div class="mb-3 flex items-center justify-between"><h2>Monsters</h2><span class="text-xs uppercase tracking-[0.25em] text-zinc-500">Combat</span></div><div class="space-y-2"><button class="w-full rounded-2xl border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-left" data-action="start_combat" data-id="field_rat"><div class="flex items-center justify-between gap-4"><div><div class="font-semibold">Field Rat</div><div class="mt-1 text-xs text-zinc-400">Lv 1 · HP 10 · ATK 1</div></div><span class="icon-[mdi--sword-cross] icon-md { monsterIconClass(active) }"></span></div></button></div></div><div class="card"><div class="mb-3 flex items-center justify-between"><h2>Skills</h2><span class="text-xs uppercase tracking-[0.25em] text-zinc-500">Gather</span></div><div class="space-y-3"><div class="rounded-2xl border border-cyan-500/30 bg-cyan-500/5 p-3"><div class="mb-3 flex items-center justify-between"><div><div class="font-semibold">Woodcutting</div><div class="mt-1 text-xs text-zinc-400">Gathering skill</div></div><button type="button" class="btn" data-action="select_skill" data-id="woodcutting">Select</button></div><div class="space-y-2"><button class="w-full rounded-xl border border-zinc-800 bg-zinc-950 px-3 py-3 text-left hover:border-zinc-700" data-action="start_node" data-id="oak_tree" data-skill-id="woodcutting"><div class="flex items-center justify-between gap-4"><div><div class="font-medium">Oak Tree</div><div class="mt-1 text-xs text-zinc-400">Lv 1 · XP 5.0 · oak_log x1</div></div><span class="icon-[mdi--axe] icon-md text-zinc-500"></span></div></button></div></div></div></div></section><section id="inventory-panel" class="card"><div class="mb-4 flex items-center justify-between"><h2>Inventory</h2><span class="text-xs uppercase tracking-[0.25em] text-zinc-500">Bag</span></div><div class="ui-grid-inventory"><div class="ui-grid-item-slot"></div><div class="ui-grid-item-slot"></div><div class="ui-grid-item-slot"></div><div class="ui-grid-item-slot"></div><div class="ui-grid-item-slot"></div></div></section></div></div></main><nav class="fixed inset-x-0 bottom-0 z-40 mx-auto max-w-md px-4 pb-4 md:hidden"><div class="relative rounded-[2rem] border border-zinc-800/80 bg-zinc-900/95 px-3 py-3 shadow-2xl backdrop-blur"><div class="grid grid-cols-5 items-end gap-2"><button type="button" class="flex flex-col items-center justify-center gap-1 text-cyan-400" data-tab-open="combat"><span class="icon-[mdi--sword-cross] icon-lg"></span></button> <button type="button" class="flex flex-col items-center justify-center gap-1 text-zinc-400" data-tab-open="equipment"><span class="icon-[mdi--shield-sword] icon-lg"></span></button><div class="relative -mt-10 flex items-center justify-center"><button type="button" class="flex h-24 w-24 items-center justify-center rounded-full border border-zinc-800 bg-black shadow-[0_0_0_6px_rgba(24,24,27,0.95)]" data-tab-open="character"><span class="icon-[mdi--account-network] icon-lg text-zinc-200"></span></button></div><button type="button" class="flex flex-col items-center justify-center gap-1 text-zinc-400" data-tab-open="inventory"><span class="icon-[mdi--treasure-chest] icon-lg"></span></button> <button type="button" class="flex flex-col items-center justify-center gap-1 text-zinc-400" data-tab-open="settings"><span class="icon-[mdi--cog] icon-lg"></span></button></div></div></nav></div></body></html>

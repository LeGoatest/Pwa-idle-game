<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pwa Idle Game</title><link rel="stylesheet" href="/static/css/output.css"><script src="https://unpkg.com/htmx.org@1.9.12"></script><script src="/static/js/wasm_exec.js"></script><script src="/static/js/wasm-loader.js"></script><script type="module" src="/static/js/app.js"></script></head><body class="min-h-screen bg-zinc-950 text-zinc-100"><main class="mx-auto max-w-6xl p-4 md:p-6"><header class="mb-4 rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h1 class="text-2xl font-bold">Pwa Idle Game</h1><p class="text-sm text-zinc-400">Static Go + templ build for GitHub Pages</p></header><nav class="mb-4 flex flex-wrap gap-2"><button class="rounded border border-zinc-700 bg-zinc-800 px-3 py-2 hover:bg-zinc-700" data-tab-open="combat">Combat</button> <button class="rounded border border-zinc-700 bg-zinc-800 px-3 py-2 hover:bg-zinc-700" data-tab-open="map">Map</button> <button class="rounded border border-zinc-700 bg-zinc-800 px-3 py-2 hover:bg-zinc-700" data-tab-open="skills">Skills</button> <button class="rounded border border-zinc-700 bg-zinc-800 px-3 py-2 hover:bg-zinc-700" data-action="stop_activity">Stop</button> <button class="rounded border border-zinc-700 bg-zinc-800 px-3 py-2 hover:bg-zinc-700" data-action="save_now">Save</button></nav><section class="grid gap-4 lg:grid-cols-[320px_minmax(0,1fr)]"><aside id="selections-panel" class="rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h2 class="mb-3 text-lg font-semibold">Selections</h2><div class="mb-4"><div class="mb-2 text-sm font-medium text-zinc-300">Zones</div><div id="zones-list" class="space-y-2"><button class="block w-full rounded border border-emerald-600 bg-emerald-950 px-3 py-2 text-left text-emerald-200" data-zone-id="verdant_meadows"><div class="font-medium">Verdant Meadows</div><div class="text-xs text-zinc-400">Lv 1</div></button></div></div><div class="mb-4"><div class="mb-2 text-sm font-medium text-zinc-300">Monsters</div><div id="monsters-list" class="space-y-2"><button class="block w-full rounded border border-rose-600 bg-rose-950 px-3 py-2 text-left text-rose-200" data-monster-id="field_rat"><div class="font-medium">Field Rat</div><div class="text-xs text-zinc-400">Lv 1 · HP 10 · ATK 1</div></button></div></div><div><div class="mb-2 text-sm font-medium text-zinc-300">Skills / Nodes</div><div id="skills-list" class="space-y-3"><div class="rounded border border-sky-600 bg-sky-950 p-3"><button class="w-full text-left" data-skill-id="woodcutting"><div class="font-medium">Woodcutting</div><div class="text-xs text-zinc-400">woodcutting</div></button> <div class="mt-2 space-y-2"><button class="block w-full rounded border border-zinc-800 bg-zinc-950 px-3 py-2 text-left hover:bg-zinc-800" data-node-id="oak_tree" data-skill-id="woodcutting"><div class="font-medium">Oak Tree</div><div class="text-xs text-zinc-400">Lv 1 · XP 5.0 · oak_log x1</div></button></div></div></div></div></aside><div class="space-y-4"><section id="stats-panel" class="rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h2 class="mb-3 text-lg font-semibold">Stats</h2><div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4"><div class="rounded border border-zinc-800 p-3"><span class="text-zinc-400">Gold:</span> <span class="font-semibold" id="stat-gold">0</span></div><div class="rounded border border-zinc-800 p-3"><span class="text-zinc-400">Kills:</span> <span class="font-semibold" id="stat-kills">0</span></div><div class="rounded border border-zinc-800 p-3"><span class="text-zinc-400">Attack:</span> <span class="font-semibold" id="stat-attack">2</span></div><div class="rounded border border-zinc-800 p-3"><span class="text-zinc-400">Combat Lv:</span> <span class="font-semibold" id="stat-combat-level">1</span></div></div></section><section id="activity-panel" class="rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h2 class="mb-3 text-lg font-semibold">Activity</h2><div class="grid gap-3 md:grid-cols-2"><div class="rounded border border-zinc-800 p-3"><div class="flex justify-between gap-4"><span class="text-zinc-400">Kind</span> <span id="activity-kind">none</span></div><div class="mt-1 flex justify-between gap-4"><span class="text-zinc-400">Zone</span> <span id="activity-zone">-</span></div><div class="mt-1 flex justify-between gap-4"><span class="text-zinc-400">Monster</span> <span id="activity-monster">-</span></div><div class="mt-1 flex justify-between gap-4"><span class="text-zinc-400">Skill</span> <span id="activity-skill">-</span></div><div class="mt-1 flex justify-between gap-4"><span class="text-zinc-400">Node</span> <span id="activity-node">-</span></div><div class="mt-1 flex justify-between gap-4"><span class="text-zinc-400">Progress</span> <span id="activity-progress">0</span></div></div><div class="rounded border border-zinc-800 p-3"><div class="flex justify-between gap-4"><span class="text-zinc-400">Enemy HP</span> <span id="enemy-hp">12 / 12</span></div><button class="mt-4 rounded border border-emerald-700 bg-emerald-800 px-3 py-2 hover:bg-emerald-700" data-action="start_current_combat">Start Combat</button></div></div></section><section id="inventory-panel" class="rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h2 class="mb-3 text-lg font-semibold">Inventory</h2><div id="inventory-list" class="grid gap-2 md:grid-cols-2 xl:grid-cols-3"><div class="text-sm text-zinc-500">Inventory is empty.</div></div></section><section class="rounded-lg border border-zinc-800 bg-zinc-900 p-4"><h2 class="mb-3 text-lg font-semibold">Debug State JSON</h2><pre id="app-state" class="overflow-auto rounded border border-zinc-800 bg-zinc-950 p-3 text-xs text-zinc-300"></pre></section></div></section></main></body></html>

name: Build Versioned Dist

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to build and update"
        required: true
        default: "migration/tinygo-wasm"
      commit_message:
        description: "Commit message"
        required: true
        default: "chore: update versioned dist build"

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Show repo state
        shell: bash
        run: |
          set -euo pipefail
          git branch --show-current
          pwd
          ls -la
          test -f go.mod
          test -f Makefile
          test -f package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.35.0"

      - name: Setup templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.865

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install

      - name: Generate templ files
        shell: bash
        run: |
          set -euo pipefail
          templ generate

      - name: Resolve Go module deps
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          test -f go.sum

      - name: Build dist
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          make clean
          make build

      - name: Stamp build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_ID="build-${BUILD_TIMESTAMP}-${SHORT_SHA}"

          echo "build_timestamp=${BUILD_TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Copy dist into versioned folders
        shell: bash
        run: |
          set -euo pipefail

          BUILD_ID="${{ steps.meta.outputs.build_id }}"
          BUILD_TIMESTAMP="${{ steps.meta.outputs.build_timestamp }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"

          mkdir -p dist/latest
          mkdir -p dist/builds
          mkdir -p "dist/builds/${BUILD_ID}"

          find dist/latest -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true
          find "dist/builds/${BUILD_ID}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true

          for entry in dist/*; do
            name="$(basename "$entry")"
            if [ "$name" = "latest" ] || [ "$name" = "builds" ]; then
              continue
            fi
            cp -R "$entry" dist/latest/
            cp -R "$entry" "dist/builds/${BUILD_ID}/"
          done

          cat > "dist/builds/${BUILD_ID}/build-info.json" <<EOF
          {
            "buildId": "${BUILD_ID}",
            "timestampUtc": "${BUILD_TIMESTAMP}",
            "commitShaShort": "${SHORT_SHA}",
            "branch": "${TARGET_BRANCH}",
            "workflow": "Build Versioned Dist",
            "runNumber": "${{ github.run_number }}",
            "runId": "${{ github.run_id }}"
          }
          EOF

          cat > "dist/latest/build-info.json" <<EOF
          {
            "buildId": "${BUILD_ID}",
            "timestampUtc": "${BUILD_TIMESTAMP}",
            "commitShaShort": "${SHORT_SHA}",
            "branch": "${TARGET_BRANCH}",
            "workflow": "Build Versioned Dist",
            "runNumber": "${{ github.run_number }}",
            "runId": "${{ github.run_id }}"
          }
          EOF

      - name: Commit versioned dist
        shell: bash
        run: |
          set -euo pipefail
          git add dist
          if git diff --cached --quiet; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "${{ github.event.inputs.commit_message }}"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.event.inputs.target_branch }}

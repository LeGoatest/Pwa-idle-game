name: Rebuild Tailwind CSS

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to rebuild CSS on"
        required: true
        default: "main"
      commit_message:
        description: "Commit message"
        required: true
        default: "chore: rebuild Tailwind CSS"

permissions:
  contents: write

concurrency:
  group: rebuild-tailwind-${{ github.event.inputs.target_branch }}
  cancel-in-progress: false

jobs:
  rebuild-css:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Rebuild Tailwind CSS 4 output
        run: npm run build:css

      - name: Commit rebuilt CSS
        shell: bash
        run: |
          set -euo pipefail
          git add assets/css/style.css package-lock.json
          if git diff --cached --quiet; then
            echo "No Tailwind CSS changes to commit."
            exit 0
          fi
          git commit -m "${{ github.event.inputs.commit_message }}"

      - name: Push changes
        run: git push origin HEAD:${{ github.event.inputs.target_branch }}

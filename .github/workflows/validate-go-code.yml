name: Validate Go migration branch

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to validate"
        required: true
        default: "migration/tinygo-wasm"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Show repo state
        shell: bash
        run: |
          set -euo pipefail
          echo "branch=$(git branch --show-current)"
          pwd
          ls -la
          test -f go.mod
          test -f Makefile
          test -f package.json
          test -d internal/game
          test -d internal/content
          test -d frontend/wasm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.35.0"

      - name: Setup templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.865

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps
        run: npm install

      - name: Generate templ files
        shell: bash
        run: |
          set -euo pipefail
          templ generate

      - name: Validate content
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/content-validate

      - name: Build internal/content
        shell: bash
        run: |
          set -euo pipefail
          go build ./internal/content

      - name: Build internal/game
        shell: bash
        run: |
          set -euo pipefail
          go build ./internal/game

      - name: Build buildsite
        shell: bash
        run: |
          set -euo pipefail
          go build ./cmd/buildsite

      - name: Build content builder
        shell: bash
        run: |
          set -euo pipefail
          go build ./cmd/buildcontent

      - name: Build wasm
        shell: bash
        run: |
          set -euo pipefail
          tinygo build -target wasm -opt=z -no-debug -o /tmp/app.wasm ./frontend/wasm

      - name: Run simulate
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/simulate

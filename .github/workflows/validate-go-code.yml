name: Validate Go Code

on:
  workflow_dispatch:
  push:
    branches:
      - migration/tinygo-wasm

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.35.0"

      - name: Setup templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate templ files
        run: templ generate

      - name: Validate content
        run: go run ./cmd/content-validate

      - name: Build buildsite
        run: go build ./cmd/buildsite

      - name: Build content package
        run: go build ./internal/content

      - name: Build game package
        run: go build ./internal/game

      - name: Build wasm
        run: tinygo build -target wasm -opt=z -no-debug -o /tmp/app.wasm ./frontend/wasm

      - name: Run simulate
        run: go run ./cmd/simulate

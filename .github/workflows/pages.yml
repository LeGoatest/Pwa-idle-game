name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Show repo state
        run: |
          pwd
          ls -la
          ls -la assets || true
          ls -la assets/css || true

      - name: Install dependencies
        run: npm install

      - name: Ensure CSS output directory exists
        run: mkdir -p assets/css

      - name: Build CSS
        run: npm run build:css

      - name: Verify CSS was generated
        run: |
          ls -la assets/css
          test -f assets/css/style.css
          test -s assets/css/style.css
          wc -c assets/css/style.css
          head -c 200 assets/css/style.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

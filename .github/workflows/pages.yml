name: Build and Deploy Pages

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to build and deploy"
        required: true
        default: "migration/tinygo-wasm"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Show repo state
        shell: bash
        run: |
          set -euo pipefail
          git branch --show-current
          pwd
          ls -la
          test -f go.mod
          test -f Makefile
          test -f package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.35.0"

      - name: Setup templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.865

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install

      - name: Generate templ files
        shell: bash
        run: |
          set -euo pipefail
          templ generate

      - name: Resolve Go module deps
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          test -f go.sum

      - name: Build dist
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          make build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

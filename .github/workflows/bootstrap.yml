name: Bootstrap standard Go migration layout

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to modify"
        required: true
        default: "migration/tinygo-wasm"
      commit_message:
        description: "Commit message"
        required: true
        default: "chore: bootstrap standard go migration layout"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create standard Go project layout
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p cmd/web
          mkdir -p cmd/simulate
          mkdir -p cmd/content-validate

          mkdir -p internal/content
          mkdir -p internal/game
          mkdir -p internal/storage

          mkdir -p frontend/wasm

          mkdir -p web/static/css
          mkdir -p web/static/js
          mkdir -p web/static/wasm
          mkdir -p web/templates
          mkdir -p web/views

          mkdir -p content
          mkdir -p content/monsters
          mkdir -p content/zones
          mkdir -p content/skills
          mkdir -p content/drop_tables
          mkdir -p content/shop

          mkdir -p assets/items
          mkdir -p assets/icons

          mkdir -p build
          mkdir -p legacy/js

      - name: Write go.mod
        run: |
          cat > go.mod <<'EOF'
          module github.com/LeGoatest/Pwa-idle-game

          go 1.24.0
          EOF

      - name: Write tinygo.json
        run: |
          cat > tinygo.json <<'EOF'
          {
            "scheduler": "none",
            "gc": "leaking",
            "no-debug": true
          }
          EOF

      - name: Write package.json
        run: |
          cat > package.json <<'EOF'
          {
            "name": "pwa-idle-game",
            "private": true,
            "version": "0.0.0",
            "scripts": {
              "build:css": "npx @tailwindcss/cli -i ./input.css -o ./web/static/css/output.css --minify",
              "watch:css": "npx @tailwindcss/cli -i ./input.css -o ./web/static/css/output.css --watch"
            },
            "devDependencies": {
              "@tailwindcss/cli": "^4.1.12",
              "tailwindcss": "^4.1.12"
            }
          }
          EOF

      - name: Write input.css
        run: |
          cat > input.css <<'EOF'
          @import "tailwindcss";
          EOF

      - name: Write Makefile
        run: |
          cat > Makefile <<'EOF'
          GO=go
          TINYGO=tinygo
          TAILWIND=npx @tailwindcss/cli

          .PHONY: run build build-server build-wasm build-css test simulate validate-content clean

          run:
          	$(GO) run ./cmd/web

          build:
          	$(MAKE) build-server
          	$(MAKE) build-css
          	$(MAKE) build-wasm

          build-server:
          	mkdir -p build
          	$(GO) build -o build/server ./cmd/web

          build-wasm:
          	mkdir -p web/static/wasm
          	$(TINYGO) build -target wasm -opt=z -no-debug -o web/static/wasm/app.wasm ./frontend/wasm

          build-css:
          	mkdir -p web/static/css
          	$(TAILWIND) -i ./input.css -o ./web/static/css/output.css --minify

          test:
          	$(GO) test ./...

          simulate:
          	$(GO) run ./cmd/simulate

          validate-content:
          	$(GO) run ./cmd/content-validate

          clean:
          	rm -rf build
          	rm -f web/static/wasm/app.wasm
          EOF

      - name: Write gitignore
        run: |
          cat > .gitignore <<'EOF'
          build/
          tmp/
          dist/
          node_modules/
          .DS_Store
          web/static/wasm/app.wasm
          web/static/css/output.css
          EOF

      - name: Write cmd/web/main.go
        run: |
          cat > cmd/web/main.go <<'EOF'
          package main

          import (
          	"log"
          	"net/http"
          )

          func main() {
          	mux := http.NewServeMux()

          	mux.Handle("/static/", http.StripPrefix("/static/", http.FileServer(http.Dir("web/static"))))
          	mux.Handle("/assets/", http.StripPrefix("/assets/", http.FileServer(http.Dir("assets"))))
          	mux.Handle("/content/", http.StripPrefix("/content/", http.FileServer(http.Dir("content"))))

          	mux.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {
          		w.Header().Set("Content-Type", "text/html; charset=utf-8")
          		_, _ = w.Write([]byte(`<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Pwa Idle Game</title>
            <link rel="stylesheet" href="/static/css/output.css">
          </head>
          <body>
            <main class="min-h-screen p-6">
              <h1 class="text-3xl font-bold">Pwa Idle Game</h1>
              <p class="mt-4">Standard Go migration scaffold is live.</p>
            </main>
            <script src="/static/js/wasm_exec.js"></script>
            <script src="/static/js/wasm-loader.js"></script>
          </body>
          </html>`))
          	})

          	log.Println("serving on :8080")
          	log.Fatal(http.ListenAndServe(":8080", mux))
          }
          EOF

      - name: Write cmd/simulate/main.go
        run: |
          cat > cmd/simulate/main.go <<'EOF'
          package main

          import "fmt"

          func main() {
          	fmt.Println("simulate stub")
          }
          EOF

      - name: Write cmd/content-validate/main.go
        run: |
          cat > cmd/content-validate/main.go <<'EOF'
          package main

          import "fmt"

          func main() {
          	fmt.Println("content validate stub")
          }
          EOF

      - name: Write internal/content/registry.go
        run: |
          cat > internal/content/registry.go <<'EOF'
          package content

          type Registry struct{}
          EOF

      - name: Write internal/game/state.go
        run: |
          cat > internal/game/state.go <<'EOF'
          package game

          type EquipmentState struct {
          	Weapon  string `json:"weapon"`
          	Head    string `json:"head"`
          	Chest   string `json:"chest"`
          	Offhand string `json:"offhand"`
          	Feet    string `json:"feet"`
          }

          type UIState struct {
          	Tab            string `json:"tab"`
          	CurrentZoneID  string `json:"currentZoneId"`
          	CurrentMonsterID string `json:"currentMonsterId"`
          	CurrentSkillID string `json:"currentSkillId"`
          	CombatMode     string `json:"combatMode"`
          	SkillsMode     string `json:"skillsMode"`
          }

          type ActivityState struct {
          	Kind      string  `json:"kind"`
          	ZoneID    string  `json:"zoneId"`
          	MonsterID string  `json:"monsterId"`
          	SkillID   string  `json:"skillId"`
          	NodeID    string  `json:"nodeId"`
          	Progress  float64 `json:"progress"`
          }

          type GameState struct {
          	Version int `json:"version"`

          	Gold  int `json:"gold"`
          	Kills int `json:"kills"`

          	Attack  int `json:"attack"`
          	Defense int `json:"defense"`
          	HP      int `json:"hp"`
          	MaxHP   int `json:"maxHp"`

          	EnemyHP    int `json:"enemyHp"`
          	EnemyMaxHP int `json:"enemyMaxHp"`

          	CombatXP int `json:"combatXp"`
          	WoodXP   int `json:"woodXp"`
          	MineXP   int `json:"mineXp"`

          	CombatLevel int `json:"combatLevel"`
          	WoodLevel   int `json:"woodLevel"`
          	MineLevel   int `json:"mineLevel"`

          	Inventory map[string]int `json:"inventory"`
          	Equipment EquipmentState `json:"equipment"`
          	UI        UIState        `json:"ui"`
          	Activity  ActivityState  `json:"activity"`

          	UpdatedAt int64 `json:"updatedAt"`
          }

          func NewDefaultState() *GameState {
          	return &GameState{
          		Version: 1,
          		Attack:  2,
          		Defense: 1,
          		HP:      20,
          		MaxHP:   20,
          		EnemyHP: 12,
          		EnemyMaxHP: 12,
          		CombatLevel: 1,
          		WoodLevel:   1,
          		MineLevel:   1,
          		Inventory:   map[string]int{},
          		UI: UIState{
          			Tab:        "combat",
          			CombatMode: "zone",
          			SkillsMode: "list",
          		},
          		Activity: ActivityState{
          			Kind: "none",
          		},
          	}
          }
          EOF

      - name: Write internal/game/actions.go
        run: |
          cat > internal/game/actions.go <<'EOF'
          package game

          type Action struct {
          	Type string `json:"type"`
          	ID   string `json:"id"`
          }
          EOF

      - name: Write internal/game/engine.go
        run: |
          cat > internal/game/engine.go <<'EOF'
          package game

          func Tick(state *GameState, deltaMs int64) {
          	state.Activity.Progress += float64(deltaMs)
          	state.UpdatedAt += deltaMs
          }
          EOF

      - name: Write internal/storage/save.go
        run: |
          cat > internal/storage/save.go <<'EOF'
          package storage

          type SaveEnvelope struct {
          	StateJSON string `json:"stateJson"`
          }
          EOF

      - name: Write frontend/wasm/main.go
        run: |
          cat > frontend/wasm/main.go <<'EOF'
          package main

          import (
          	"encoding/json"
          	"syscall/js"

          	"github.com/LeGoatest/Pwa-idle-game/internal/game"
          )

          var state = game.NewDefaultState()

          func getState(this js.Value, args []js.Value) any {
          	out, _ := json.Marshal(state)
          	return string(out)
          }

          func tick(this js.Value, args []js.Value) any {
          	if len(args) > 0 {
          		deltaMs := int64(args[0].Int())
          		game.Tick(state, deltaMs)
          	}
          	return nil
          }

          func dispatch(this js.Value, args []js.Value) any {
          	return nil
          }

          func main() {
          	js.Global().Set("gameGetState", js.FuncOf(getState))
          	js.Global().Set("gameTick", js.FuncOf(tick))
          	js.Global().Set("gameDispatch", js.FuncOf(dispatch))
          	select {}
          }
          EOF

      - name: Write web/static/js/wasm-loader.js
        run: |
          cat > web/static/js/wasm-loader.js <<'EOF'
          (async () => {
            if (!WebAssembly.instantiateStreaming) {
              WebAssembly.instantiateStreaming = async (resp, importObject) => {
                const source = await (await resp).arrayBuffer();
                return await WebAssembly.instantiate(source, importObject);
              };
            }

            const go = new Go();
            const result = await WebAssembly.instantiateStreaming(fetch("/static/wasm/app.wasm"), go.importObject);
            go.run(result.instance);
          })().catch((err) => {
            console.error("WASM load failed:", err);
          });
          EOF

      - name: Write web/static/js/engine.js
        run: |
          cat > web/static/js/engine.js <<'EOF'
          let last = performance.now();

          function frame(now) {
            const delta = Math.floor(now - last);
            last = now;

            if (window.gameTick) {
              window.gameTick(delta);
            }

            requestAnimationFrame(frame);
          }

          requestAnimationFrame(frame);
          EOF

      - name: Write sample content placeholders
        shell: bash
        run: |
          touch content/items.jsonl
          touch content/monsters/.keep
          touch content/zones/.keep
          touch content/skills/.keep
          touch content/drop_tables/.keep
          touch content/shop/.keep
          touch assets/items/.keep
          touch assets/icons/.keep
          touch web/templates/.keep
          touch web/views/.keep


      - name: Commit changes
        shell: bash
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "${{ github.event.inputs.commit_message }}"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.event.inputs.target_branch }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#09090b">
  <title>Idle Frontier PWA</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg">
  <link rel="stylesheet" href="./assets/css/style.css?v=13">
</head>
<body class="mx-auto max-w-md bg-gamebg text-zinc-100 min-h-screen flex flex-col pb-24 shadow-2xl">
  <header class="top-0 z-50 w-full bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 p-4 space-y-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 id="station-title" class="text-xl font-bold tracking-tight text-zinc-100">Idle Frontier</h1>
        <div class="flex items-center gap-1.5 mt-0.5">
          <div id="active-pulse" class="w-2 h-2 rounded-full bg-cyan-500 hidden"></div>
          <span data-bind="activeTaskName" class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Idle</span>
        </div>
      </div>

      <div class="flex items-center gap-3 shrink-0">
        <div class="flex items-center gap-1.5 bg-zinc-800/50 px-2.5 py-1 rounded-full border border-zinc-700/50">
          <span class="icon-[game-icons--coins] icon-sm text-yellow-500"></span>
          <span data-bind="gold" class="text-sm font-medium tabular-nums">0</span>
        </div>

        <button
          class="icon-[game-icons--cog] w-6 h-6 text-zinc-400 hover:text-white transition-colors"
          hx-get="./views/settings.html"
          hx-target="#modal-content"
          hx-trigger="click"
          data-action="open-modal"
          aria-label="Open settings"></button>
      </div>
    </div>

    
    </div>
  </header>

  <main
    id="view-root"
    class="flex-1 overflow-y-auto p-4"
    hx-get="./views/combat.html"
    hx-trigger="load"
    hx-swap="innerHTML show:top"></main>

  <div id="modal-root" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-zinc-950/80 backdrop-blur-sm animate-in fade-in duration-300">
    <div id="modal-content" class="w-full max-w-sm pointer-events-auto"></div>
  </div>

  <footer class="fixed bottom-0 left-0 right-0 mx-auto max-w-md bg-zinc-900/95 backdrop-blur-xl border-t border-zinc-800/50 px-1 py-2 z-50">
    <nav class="grid grid-cols-6 items-center">
      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="combat" data-tab="combat" aria-label="Combat">
        <span class="icon-[game-icons--crossed-swords] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Hunt</span>
      </button>

      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="map" data-tab="map" aria-label="Map">
        <span class="icon-[game-icons--world] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Map</span>
      </button>

      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="skills" data-tab="skills" aria-label="Skills">
        <span class="icon-[game-icons--skills] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Skills</span>
      </button>

      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="items" data-tab="items" aria-label="Inventory">
        <span class="icon-[game-icons--locked-chest] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Vault</span>
      </button>

      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="equipment" data-tab="equipment" aria-label="Equipment">
        <span class="icon-[game-icons--battle-gear] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Gear</span>
      </button>

      <button class="flex flex-col items-center gap-1 text-zinc-400 hover:text-cyan-400 transition-all group" data-nav-tab="shop" data-tab="shop" aria-label="Shop">
        <span class="icon-[game-icons--receive-money] w-6 h-6 transition-all"></span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Shop</span>
      </button>
    </nav>
  </footer>

  <script src="./assets/js/htmx.min.js"></script>
  <script type="module" src="./assets/js/game.js?v=13"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('./sw.js')
        .then((reg) => console.log('SW Registered', reg))
        .catch((err) => console.log('SW Failed', err));
    }
  </script>
</body>
</html>

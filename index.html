<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1">

<title>Idle Pixel RPG</title>

<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="./assets/css/style.css">

<script src="./assets/js/htmx.min.js"></script>

</head>


<body class="bg-zinc-950 text-zinc-200 min-h-screen">

<div class="max-w-6xl mx-auto p-4 space-y-6">


<header class="pixel-card flex flex-wrap items-center justify-between gap-4">

<div class="flex items-center gap-6">

<div>
<div class="text-xs uppercase text-zinc-500">Gold</div>
<div data-bind="gold" class="font-black text-lg">0</div>
</div>

<div>
<div class="text-xs uppercase text-zinc-500">Kills</div>
<div data-bind="kills" class="font-black text-lg">0</div>
</div>

<div>
<div class="text-xs uppercase text-zinc-500">HP</div>
<div data-bind="hp" class="font-black text-lg">0</div>
</div>

</div>

<div class="flex items-center gap-6">

<div>
<div class="text-xs uppercase text-zinc-500">Attack</div>
<div data-bind="attack" class="font-black">0</div>
</div>

<div>
<div class="text-xs uppercase text-zinc-500">Defense</div>
<div data-bind="defense" class="font-black">0</div>
</div>

<div>
<div class="text-xs uppercase text-zinc-500">Enemy</div>
<div data-bind="enemyHp" class="font-black">0</div>
</div>

</div>

</header>


<nav class="pixel-card flex flex-wrap gap-2">

<button class="btn-secondary" data-nav-tab="combat">Combat</button>

<button class="btn-secondary" data-nav-tab="map">Map</button>

<button class="btn-secondary" data-nav-tab="skills">Skills</button>

<button class="btn-secondary" data-nav-tab="items">Inventory</button>

<button class="btn-secondary" data-nav-tab="equipment">Equipment</button>

<button class="btn-secondary" data-nav-tab="shop">Shop</button>

</nav>


<div class="pixel-card space-y-3">

<div class="text-xs uppercase text-zinc-500">
Current Activity
</div>

<div
  data-bind="activeTaskName"
  class="font-black">
Idle
</div>

<div class="h-2 bg-zinc-800 rounded overflow-hidden">

<div
  data-task-bar
  class="h-full bg-cyan-500 transition-all">
</div>

</div>

</div>


<main
  id="view-root"
  class="space-y-6">
</main>


</div>


<div
  id="modal-root"
  class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">

<div id="modal-content"></div>

</div>


<div
  id="active-pulse"
  class="fixed bottom-6 right-6 hidden">
</div>


<script type="module" src="./assets/js/game.js"></script>


</body>
</html>

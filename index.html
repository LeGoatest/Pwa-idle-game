<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#09090b">
  <title>Idle Frontier PWA</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg">
  <script>
    window.__ASSET_VERSION__ = new Date().toISOString().replace(/[-:.TZ]/g, '')
    document.write(`<link rel="stylesheet" href="./assets/css/style.css?v=${window.__ASSET_VERSION__}">`)
  </script>
</head>
<body class="game-shell">
  <header class="game-header">
    <div>
      <h1 id="station-title" class="game-header__title">Idle Frontier</h1>
      <div class="game-header__status">
        <div id="active-pulse" class="game-header__pulse hidden"></div>
        <span data-bind="activeTaskName" class="game-header__status-text">Idle</span>
      </div>
    </div>

    <div class="game-header__actions">
      <div class="game-resource-pill">
        <span class="icon-[game-icons--coins] icon-sm game-resource-pill__icon"></span>
        <span data-bind="gold" class="game-resource-pill__value">0</span>
      </div>

      <button
        class="game-header__settings icon-[game-icons--cog]"
        hx-get="./views/settings.html?v=0.0.10"
        hx-target="#modal-content"
        hx-trigger="click"
        data-action="open-modal"
        aria-label="Open settings"></button>
    </div>
  </header>

  <main
    id="view-root"
    class="game-main"
    hx-get="./views/combat.html?v=0.0.10"
    hx-trigger="load"
    hx-swap="innerHTML"></main>

  <div id="modal-root" class="game-modal hidden">
    <div id="modal-content" class="game-modal__content"></div>
  </div>

  <footer class="game-bottom-nav">
    <div class="game-bottom-nav__inner">
      <div class="game-bottom-nav__surface">
        <nav class="game-bottom-nav__list">
          <button
            class="game-bottom-nav__item"
            data-nav-tab="combat"
            data-tab="combat"
            aria-label="Combat">
            <span class="icon-[game-icons--crossed-swords] icon-nav"></span>
          </button>

          <button
            class="game-bottom-nav__item"
            data-nav-tab="equipment"
            data-tab="equipment"
            aria-label="Equipment">
            <span class="icon-[game-icons--battle-gear] icon-nav"></span>
          </button>

          <div class="game-bottom-nav__primary-wrap">
            <button
              class="game-bottom-nav__primary"
              data-nav-tab="skills"
              data-tab="skills"
              aria-label="Skills">
              <span class="icon-[game-icons--skills] icon-nav-primary"></span>
            </button>
            <div class="game-bottom-nav__spacer"></div>
          </div>

          <button
            class="game-bottom-nav__item"
            data-nav-tab="items"
            data-tab="items"
            aria-label="Inventory">
            <span class="icon-[game-icons--locked-chest] icon-nav"></span>
          </button>

          <button
            class="game-bottom-nav__item"
            hx-get="./views/settings.html?v=0.0.10"
            hx-target="#modal-content"
            hx-trigger="click"
            data-action="open-modal"
            aria-label="Settings">
            <span class="icon-[game-icons--cog] icon-nav"></span>
          </button>
        </nav>
      </div>
    </div>
  </footer>

  <script>
    document.write(`<script src="./assets/js/htmx.min.js?v=${window.__ASSET_VERSION__}"><\/script>`)
    document.write(`<script type="module" src="./assets/js/game.js?v=${window.__ASSET_VERSION__}"><\/script>`)
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register(`./sw.js?v=${window.__ASSET_VERSION__}`)
        .then((reg) => console.log('SW Registered', reg))
        .catch((err) => console.log('SW Failed', err));
    }
  </script>
</body>
</html>

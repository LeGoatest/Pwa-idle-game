<div class="space-y-5">
  <div data-monster-panel class="space-y-4"></div>

  <div class="grid grid-cols-4 gap-3">
    <div class="rounded-3xl bg-zinc-800/80 p-3 text-center">
      <div class="text-cyan-400 text-lg">⚔</div>
      <div data-bind="attack" class="text-lg font-black tabular-nums">0</div>
    </div>

    <div class="rounded-3xl bg-zinc-800/80 p-3 text-center">
      <div class="text-zinc-300 text-lg">💪</div>
      <div data-bind="actionSpeed" class="text-lg font-black tabular-nums">0s</div>
    </div>

    <div class="rounded-3xl bg-zinc-800/80 p-3 text-center">
      <div class="text-emerald-400 text-lg">🛡</div>
      <div data-bind="defense" class="text-lg font-black tabular-nums">0</div>
    </div>

    <div class="rounded-3xl bg-zinc-800/80 p-3 text-center">
      <div class="text-rose-400 text-lg">♥</div>
      <div data-bind="hp" class="text-lg font-black tabular-nums">0</div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-5">
    <div class="space-y-3">
      <button class="w-full aspect-square rounded-3xl bg-zinc-700/80 border-4 border-orange-400 shadow-[0_0_25px_rgba(251,146,60,0.35)] flex items-center justify-center">
        <span class="text-7xl">⚔</span>
      </button>
      <div class="text-center text-2xl text-zinc-200">Weapon</div>

      <div class="flex gap-3">
        <button class="rounded-2xl bg-zinc-700/80 w-20 h-20 text-xl" data-action="fightMonster">▶</button>
        <button class="rounded-2xl bg-zinc-700/80 w-20 h-20 text-xl" data-action="stopActivity">Ⅱ</button>
      </div>
    </div>

    <div class="space-y-3">
      <button class="rounded-2xl bg-zinc-700/80 px-6 py-5 text-lg font-black text-zinc-100">⚔ ATK</button>
      <div class="text-2xl text-zinc-200">ATK Lv. <span data-bind="combatLevel">1</span></div>
      <div class="h-7 rounded-xl bg-zinc-800 overflow-hidden">
        <div data-task-bar class="h-full w-0 bg-zinc-600 transition-all duration-100"></div>
      </div>
      <div class="text-right text-xl text-zinc-300"><span data-bind="combatXp">0</span> / <span data-bind="combatNextXp">20</span></div>

      <div class="grid grid-cols-2 gap-3">
        <button class="rounded-3xl bg-zinc-700/80 h-24 text-3xl text-yellow-300">📖</button>
        <button class="rounded-3xl bg-zinc-800/80 h-24 text-3xl text-zinc-500">▧</button>
      </div>

      <div class="rounded-full bg-zinc-700/80 px-5 py-3 flex items-center justify-between text-xl">
        <span class="text-rose-400">♥</span>
        <span data-bind="hp">20</span>
        <span class="text-emerald-400">+0</span>
        <span class="text-yellow-300">▰</span>
        <span data-bind="gold">0</span>
      </div>
    </div>
  </div>

  <div data-monster-list class="hidden"></div>
</div>

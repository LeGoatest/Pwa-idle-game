<section class="combat-screen">
  <div data-monster-panel class="combat-screen__monster-panel"></div>

  <div class="combat-bars">
    <div class="combat-bars__track">
      <div data-task-bar class="combat-bars__fill"></div>
    </div>
    <div class="combat-bars__track combat-bars__track--hp">
      <div data-enemy-hp-bar class="combat-bars__fill combat-bars__fill--hp"></div>
    </div>
    <div class="combat-bars__label" data-bind="actionSpeed">2.00s</div>
    <div class="combat-bars__label" data-bind="enemyHpText">12 / 12</div>
  </div>

  <div class="combat-layout">
    <section class="combat-weapon-panel" aria-label="Weapon controls">
      <button
        class="combat-weapon-button"
        data-action="fightMonster"
        aria-label="Fight selected monster">
        <span class="icon-[game-icons--broadsword] combat-weapon-icon"></span>
      </button>
      <div class="combat-weapon-label">Weapon</div>

      <div class="combat-action-row">
        <button class="combat-action-button" data-action="fightMonster" aria-label="Start combat">▶</button>
        <button class="combat-action-button" data-action="stopActivity" aria-label="Pause combat">Ⅱ</button>
      </div>
    </section>

    <section class="combat-skill-panel" aria-label="Attack skill">
      <button class="combat-attack-button" data-action="fightMonster">
        ⚔ ATK
      </button>
      <div class="combat-skill-title">ATK Lv. <span data-bind="combatLevel">1</span></div>
      <div class="combat-xp-bar">
        <div data-combat-xp-bar class="combat-xp-bar__fill"></div>
      </div>
      <div class="combat-xp-count"><span data-bind="combatXp">0</span> / <span data-bind="combatNextXp">20</span></div>

      <div class="combat-utility-grid">
        <button class="combat-utility-button combat-utility-button--guide" aria-label="Combat guide">📖</button>
        <button class="combat-utility-button combat-utility-button--locked" aria-label="Locked utility">▧</button>
      </div>

      <div class="combat-resource-footer">
        <span class="combat-resource-footer__hp-icon">♥</span>
        <span data-bind="hp">20</span>
        <span class="combat-resource-footer__heal">+0</span>
        <span class="combat-resource-footer__gold-icon">▰</span>
        <span data-bind="gold">0</span>
      </div>
    </section>
  </div>

  <div data-monster-list class="is-hidden"></div>
</section>

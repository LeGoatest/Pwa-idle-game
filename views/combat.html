<section class="combat-screen">
  <div data-monster-panel class="combat-monster-stage"></div>

  <div class="combat-timers" aria-label="Combat timers">
    <div class="combat-timer">
      <div class="combat-timer__track" aria-hidden="true">
        <div data-task-bar class="combat-timer__fill"></div>
      </div>
      <div class="combat-timer__label" data-bind="actionSpeed">3s</div>
    </div>

    <div class="combat-timer">
      <div class="combat-timer__track" aria-hidden="true">
        <div data-enemy-action-bar class="combat-timer__fill combat-timer__fill--enemy"></div>
      </div>
      <div class="combat-timer__label" data-bind="enemySpeed">2.4s</div>
    </div>
  </div>

  <div class="combat-layout">
    <section class="combat-weapon" aria-label="Weapon slot">
      <button class="combat-weapon__slot" data-action="fightMonster" aria-label="Fight selected monster">
        <span class="icon-[game-icons--broadsword] combat-weapon__icon"></span>
      </button>
      <div class="combat-weapon__name">Training Sword</div>
    </section>

    <section class="combat-skill" aria-label="Attack skill">
      <button class="combat-skill__button" data-action="fightMonster" aria-label="Attack skill">
        <span>⚔ ATK</span>
        <span>Lv. <span data-bind="combatLevel">1</span></span>
      </button>
      <div class="combat-skill__title">Attack</div>
      <div class="combat-skill__xp" aria-hidden="true">
        <div data-combat-xp-bar class="combat-skill__xp-fill"></div>
      </div>
      <div class="combat-skill__xp-text"><span data-bind="combatXp">0</span> / <span data-bind="combatNextXp">20</span></div>
    </section>
  </div>

  <div class="combat-actions" aria-label="Combat actions">
    <button class="combat-action combat-action--play" data-action="fightMonster" aria-label="Start combat">▶</button>
    <button class="combat-action combat-action--selector" data-action="openTargetSelector" aria-label="Choose monster">↔</button>
    <button class="combat-action combat-action--locked" data-action="lockedAction" type="button" aria-label="Locked action">🔒</button>
    <button class="combat-action combat-action--locked" data-action="lockedAction" type="button" aria-label="Locked action">🔒</button>
  </div>

  <div class="combat-status-pill" aria-label="Player status">
    <span class="combat-status-pill__hp">♥ <span data-bind="hp">20/20</span></span>
    <span class="combat-status-pill__food">+<span data-bind="lastFoodHeal">0</span></span>
  </div>

  <div data-combat-select-overlay class="combat-select-overlay" aria-hidden="true"></div>
  <div data-monster-list class="is-hidden"></div>
</section>

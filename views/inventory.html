<section class="space-y-6">

  <header>
    <h1 class="text-2xl font-black uppercase italic">
      Inventory
    </h1>
  </header>

  <div class="grid grid-cols-2 gap-4">

    <div class="pixel-card">
      <div class="text-sm text-zinc-500">Gold</div>
      <div class="text-xl font-black" data-bind="gold"></div>
    </div>

    <div class="pixel-card">
      <div class="text-sm text-zinc-500">Logs</div>
      <div class="text-xl font-black" data-bind="logs"></div>
    </div>

    <div class="pixel-card">
      <div class="text-sm text-zinc-500">Ore</div>
      <div class="text-xl font-black" data-bind="ore"></div>
    </div>

    <div class="pixel-card">
      <div class="text-sm text-zinc-500">Kills</div>
      <div class="text-xl font-black" data-bind="kills"></div>
    </div>

  </div>

</section>

<section class="space-y-6">

  <header>
    <h1 class="text-2xl font-black uppercase italic">
      Shop
    </h1>
  </header>

  <div class="space-y-4">

    <div class="pixel-card flex items-center justify-between">

      <div>
        <div class="font-black">Sword</div>
        <div class="text-sm text-zinc-500">+1 Attack</div>
      </div>

      <button
        class="btn-primary"
        data-action="buySword">

        Buy

      </button>

    </div>

    <div class="pixel-card flex items-center justify-between">

      <div>
        <div class="font-black">Potion</div>
        <div class="text-sm text-zinc-500">Restore HP</div>
      </div>

      <button
        class="btn-primary"
        data-action="buyPotion">

        Buy

      </button>

    </div>

  </div>

</section>

<div class="space-y-6">

  <div class="text-xl font-black uppercase italic tracking-tight">
    Skills
  </div>

  <div class="grid grid-cols-1 gap-3">

    <div data-skill-card="woodcutting" class="pixel-card space-y-2">
      <div class="flex justify-between">
        <span class="font-black">Woodcutting</span>
        <span data-skill-level></span>
      </div>

      <div class="h-2 bg-zinc-800 rounded overflow-hidden">
        <div data-skill-xp-fill class="h-full bg-cyan-500"></div>
      </div>

      <div data-skill-xp-text class="text-xs text-zinc-500"></div>
    </div>

    <div data-skill-card="mining" class="pixel-card space-y-2">
      <div class="flex justify-between">
        <span class="font-black">Mining</span>
        <span data-skill-level></span>
      </div>

      <div class="h-2 bg-zinc-800 rounded overflow-hidden">
        <div data-skill-xp-fill class="h-full bg-cyan-500"></div>
      </div>

      <div data-skill-xp-text class="text-xs text-zinc-500"></div>
    </div>

  </div>

  <div data-skill-detail-root class="space-y-4">

    <div class="text-lg font-black" data-skill-detail-name></div>

    <div class="text-sm">
      Level <span data-skill-detail-level></span>
    </div>

    <div class="h-2 bg-zinc-800 rounded overflow-hidden">
      <div data-skill-detail-fill class="h-full bg-cyan-500"></div>
    </div>

    <div data-skill-detail-xp class="text-xs text-zinc-500"></div>

    <div data-skill-nodes class="space-y-2"></div>

  </div>

</div>

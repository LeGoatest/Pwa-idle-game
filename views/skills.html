<section class="space-y-6">

  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-black uppercase italic tracking-tight">
      Skills
    </h1>
  </header>

  <!-- Skill cards -->
  <div class="grid grid-cols-2 gap-4">

    <button
      class="pixel-card"
      data-skill-card="woodcutting"
      data-skill-open="woodcutting">

      <div class="text-lg font-black">Woodcutting</div>

      <div class="text-sm text-zinc-500">
        Level <span data-skill-level></span>
      </div>

      <div class="h-2 bg-zinc-800 rounded mt-2 overflow-hidden">
        <div
          class="h-full bg-green-500"
          data-skill-xp-fill></div>
      </div>

      <div
        class="text-xs mt-1 text-zinc-400"
        data-skill-xp-text>
      </div>

    </button>

    <button
      class="pixel-card"
      data-skill-card="mining"
      data-skill-open="mining">

      <div class="text-lg font-black">Mining</div>

      <div class="text-sm text-zinc-500">
        Level <span data-skill-level></span>
      </div>

      <div class="h-2 bg-zinc-800 rounded mt-2 overflow-hidden">
        <div
          class="h-full bg-blue-500"
          data-skill-xp-fill></div>
      </div>

      <div
        class="text-xs mt-1 text-zinc-400"
        data-skill-xp-text>
      </div>

    </button>

  </div>

  <!-- Skill detail -->
  <div
    class="mt-6"
    data-skill-detail-root>

    <div class="pixel-card space-y-4">

      <div class="flex items-center justify-between">
        <div>
          <div
            class="text-xl font-black"
            data-skill-detail-name>
          </div>

          <div class="text-sm text-zinc-500">
            Level
            <span data-skill-detail-level></span>
          </div>
        </div>
      </div>

      <div class="h-2 bg-zinc-800 rounded overflow-hidden">
        <div
          class="h-full bg-cyan-500"
          data-skill-detail-fill></div>
      </div>

      <div
        class="text-sm text-zinc-400"
        data-skill-detail-xp>
      </div>

      <div
        class="space-y-3"
        data-skill-nodes>
      </div>

    </div>

  </div>

</section>

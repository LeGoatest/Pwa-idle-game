<div class="equipment-screen">

  <div class="page-title">
    Equipment
  </div>

  <div class="equipment-list">

    <div class="equipment-slot" data-equip-slot="weapon">

      <div class="equipment-slot__body">
        <div data-equip-name class="equipment-slot__name">Empty</div>
        <div data-equip-meta class="equipment-slot__meta">Nothing equipped</div>
      </div>
    </div>

    <div class="equipment-slot" data-equip-slot="head">
      <span data-equip-icon class="icon-[game-icons--visored-helm] equipment-slot__icon"></span>

        <div data-equip-meta class="equipment-slot__meta">Nothing equipped</div>

    </div>

    <div class="equipment-slot" data-equip-slot="chest">

        <div data-equip-name class="equipment-slot__name">Empty</div>
        <div data-equip-meta class="equipment-slot__meta">Nothing equipped</div>
      </div>
    </div>

    <div class="equipment-slot" data-equip-slot="offhand">
      <span data-equip-icon class="icon-[game-icons--checked-shield] equipment-slot__icon"></span>

        <div data-equip-name class="equipment-slot__name">Empty</div>
        <div data-equip-meta class="equipment-slot__meta">Nothing equipped</div>
      </div>
    </div>

    <div class="equipment-slot" data-equip-slot="feet">
      <span data-equip-icon class="icon-[game-icons--boots] equipment-slot__icon"></span>
      <div class="equipment-slot__body">
        <div data-equip-name class="equipment-slot__name">Empty</div>
        <div data-equip-meta class="equipment-slot__meta">Nothing equipped</div>
      </div>
    </div>

  </div>
</div>
